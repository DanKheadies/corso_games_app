name: corso_games_app
description: A collection of flutter games. Good luck, have fun.

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 2.2.0+25

environment:
  sdk: ^3.5.1
  # sdk: ">=2.18.4 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  animated_text_kit: ^4.3.0
  bloc: ^9.2.1
  cloud_firestore: ^6.7.1
  cupertino_icons: ^1.0.9
  csv: ^8.0.0
  device_info_plus: ^13.2.0
  email_validator: ^3.0.0
  equatable: ^2.1.0
  expansion_tile_card: ^3.0.0
  file_picker: <11.0.2
  firebase_analytics: ^12.4.5
  firebase_auth: ^6.5.6
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flame: ^1.37.0
  flame_forge2d: ^0.19.2+6
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^22.0.1
  flutter_neumorphic_plus: ^3.5.0
  flutter_pw_validator: ^1.6.0
  font_awesome_flutter: ^11.0.0
  go_router: ^17.3.0
  hydrated_bloc: ^11.0.0
  intl: ^0.20.3
  json_annotation: ^4.12.0
  lottie: ^3.5.1
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  provider: ^6.1.5+1
  share_plus: ^13.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/main/cg-1.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#fff8e1"
  adaptive_icon_foreground: "assets/images/main/cg-0.png"
  web:
    generate: true
    image_path: "assets/images/main/cg-web.png"
    background_color: "#fff8e1"
    theme_color: "#ff7d81"
  windows:
    generate: true
    image_path: "assets/images/main/cg-1.png"
    icon_size: 48

flutter:
  uses-material-design: true

  assets:
    - assets/data/el_word/
    - assets/data/honeygram/
    - assets/fonts/slide_to_slide/
    - assets/images/dino_dash/
    - assets/images/dino_dash/cacti/
    - assets/images/dino_dash/dino/
    - assets/images/dino_dash/ptera/
    - assets/images/main/
    - assets/images/minesweeper/
    - assets/images/slide_to_slide/
    - assets/images/solitare/
    - assets/images/stack_stacks/
    - assets/images/tappy_bird/

  fonts:
    - family: Plaster
      fonts:
        - asset: assets/fonts/slide_to_slide/Plaster-Regular.ttf
